
name: Collect NESO Wind Forecast

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */3 * * *"

concurrency:
  group: neso-wind-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install collector dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests psycopg2-binary

      - name: Collect latest NESO forecast
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python collector.py
